# Эвристический Demand Score (согласовано с scenario_analysis.html)
demand_score:
  weights:
    total_sum: 0.35
    unique_customers: 0.25
    transactions_per_customer: 0.20
    poi_score: 0.12
    competitor_proximity: 0.08
  white_spot_threshold: 0.70
  min_unique_customers_percentile: 50  # P50 по уникальным клиентам для сценария «белые пятна»

scenarios:
  competitor_min_atms: 2
  low_utilization_sum_per_customer_percentile: 25
  growth_volatility_percentile: 75  # прокси по avg_std для «динамики» без временных рядов

ml:
  random_state: 42
  n_clusters: 6
  bootstrap_iterations: 8
  train_fraction: 0.85

security:
  retrain_token: "dev-change-me"

# Карта: зона размещения АТМ (окружность) и расчёт ближайших POI
ui:
  placement_radius_m: 400

# Новостройки (отдельный слой и delivery_score; файл опционален)
developments:
  csv_filename: new_buildings.csv
  # reference_date: "2026-05-14"  # раскомментируйте для демо с фиксированной «сегодня»
  buckets:
    months_urgent: 3
    score_at_12m: 0.82
    score_at_24m: 0.58
    score_at_36m: 0.38
    long_term_floor: 0.14
    long_term_decay_per_month: 0.012
    handed_over_score: 0.32
